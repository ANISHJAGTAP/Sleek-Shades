<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleek Shades</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <nav class="navbar">
    <div class="logo">Sleek Shades</div>

    <ul class="nav-links" id="navLinks">
      <li><a href="#intro">Home</a></li>
      <li><a href="#designs">Unique Designs</a></li>
      <li><a href="#patterns">Pinteresty Patterns</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>

    <div class="nav-actions">
      <button id="theme-toggle">🌙</button>
      <div class="menu-toggle" id="menu-toggle">☰</div>
    </div>
  </nav>
</header>

<!-- INTRO -->
<section id="intro" class="section intro">
  <h1>Elevate Your Style with Sleek Shades</h1>
  <p>Premium sunglasses designed for bold personalities and modern elegance.</p>
</section>

<!-- UNIQUE DESIGNS -->
<section id="designs" class="section">
  <h2>Unique Designs</h2>
  <div class="grid">
    <!-- Replace with real images -->
    <img src="images/design1.jpg">
    <img src="images/design2.jpg">
    <img src="images/design3.jpg">
    <img src="images/design4.jpg">
    <img src="images/design5.jpg">
  </div>
</section>

<!-- PINTERESTY PATTERNS -->
<section id="patterns" class="section">
  <h2>Pinteresty Patterns</h2>
  <div class="grid">
    <img src="images/pattern1.jpg">
    <img src="images/pattern2.jpg">
    <img src="images/pattern3.jpg">
    <img src="images/pattern4.jpg">
    <img src="images/pattern5.jpg">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Contact Us</h2>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
    <p id="formMessage"></p>
  </form>

</section>

<footer>
  <p>© 2026 Sleek Shades. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
